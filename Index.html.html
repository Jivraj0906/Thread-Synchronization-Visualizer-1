
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#1c2230;--bg4:#21273a;
  --border:#2d3550;--border2:#3d4870;
  --text:#cdd6f4;--muted:#6c7faa;--dim:#3d4870;
  --green:#a6e3a1;--red:#f38ba8;--amber:#f9e2af;
  --blue:#89b4fa;--teal:#94e2d5;--pink:#f5c2e7;--purple:#cba6f7;
  --green-bg:rgba(166,227,161,.12);--red-bg:rgba(243,139,168,.12);
  --amber-bg:rgba(249,226,175,.12);--blue-bg:rgba(137,180,250,.12);
}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace,sans-serif;font-size:12px;overflow:hidden}

.app{display:flex;flex-direction:column;height:100vh;min-height:600px;max-height:900px}

.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 12px;height:42px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo{font-size:13px;font-weight:700;color:var(--blue);letter-spacing:-.3px;white-space:nowrap}
.tabs{display:flex;gap:2px;overflow-x:auto;flex:1}
.tabs::-webkit-scrollbar{height:2px}.tabs::-webkit-scrollbar-thumb{background:var(--border2)}
.tab{padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;color:var(--muted);background:none;border:none;white-space:nowrap;transition:all .15s}
.tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}
.tab:hover:not(.active){color:var(--text)}
.status{font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.status.run{background:rgba(166,227,161,.15);color:var(--green);border:1px solid rgba(166,227,161,.3)}
.status.stop{background:rgba(243,139,168,.1);color:var(--red);border:1px solid rgba(243,139,168,.2)}

.body{display:flex;flex:1;overflow:hidden;min-height:0}

.left{width:180px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.left-scroll{flex:1;overflow-y:auto;padding:8px 0}
.left-scroll::-webkit-scrollbar{width:3px}.left-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;padding:6px 10px 3px}
.mbtn{display:flex;align-items:center;gap:7px;width:100%;padding:6px 10px;cursor:pointer;font-size:11px;font-family:inherit;color:var(--muted);background:none;border:none;text-align:left;transition:all .15s}
.mbtn:hover{color:var(--text);background:rgba(255,255,255,.03)}
.mbtn.active{color:var(--text);background:rgba(137,180,250,.1);border-right:2px solid var(--blue)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hdiv{height:1px;background:var(--border);margin:6px 8px}
.ctrl-area{padding:8px 10px;border-top:1px solid var(--border)}
.ctrl-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.ctrl-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.ctrl-name{font-size:10px;color:var(--muted)}
.ctrl-val{font-size:10px;color:var(--text)}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:var(--border2);border-radius:3px;outline:none;margin:3px 0 7px;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--blue);cursor:pointer}
.btn{width:100%;padding:6px 0;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:10px;font-weight:700;font-family:inherit;transition:all .15s;margin-bottom:4px}
.btn:hover{background:var(--bg4);border-color:var(--blue)}
.btn.pri{background:var(--blue);border-color:var(--blue);color:#0d1117}
.btn.pri:hover{opacity:.88}
.btn-row{display:flex;gap:4px}
.btn-row .btn{flex:1;margin-bottom:0}

.center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.center-head{height:36px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.center-title{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.center-sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.view-btns{margin-left:auto;display:flex;gap:4px}
.vbtn{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);font-size:10px;font-family:inherit;cursor:pointer;transition:all .15s}
.vbtn.active{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.canvas-wrap{flex:1;overflow:hidden;position:relative}
canvas#viz{display:block}
.metrics-bar{height:52px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;overflow-x:auto}
.metric{text-align:center;flex-shrink:0}
.mval{font-size:16px;font-weight:700;line-height:1.2}
.mlbl{font-size:9px;color:var(--muted);margin-top:1px;white-space:nowrap}

.right{width:200px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.right-head{height:36px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;font-size:11px;font-weight:700;flex-shrink:0}
.right-scroll{flex:1;overflow-y:auto;padding:8px}
.right-scroll::-webkit-scrollbar{width:3px}.right-scroll::-webkit-scrollbar-thumb{background:var(--border2)}
.tcard{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px;margin-bottom:6px;transition:border-color .15s}
.tcard.running{border-color:rgba(166,227,161,.4)}
.tcard.blocked{border-color:rgba(243,139,168,.3)}
.tcard.waiting{border-color:rgba(249,226,175,.3)}
.tcard-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.tname{font-size:11px;font-weight:700}
.tstate{font-size:9px;padding:1px 5px;border-radius:8px}
.s-run{background:var(--green-bg);color:var(--green)}
.s-blk{background:var(--red-bg);color:var(--red)}
.s-wai{background:var(--amber-bg);color:var(--amber)}
.s-slp{background:var(--blue-bg);color:var(--blue)}
.tbar-bg{background:var(--dim);height:3px;border-radius:3px;overflow:hidden}
.tbar-fg{height:100%;border-radius:3px;transition:width .25s}
.tmeta{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--muted)}
.rcard{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:8px;margin-bottom:6px}
.rcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.rname{font-size:11px;font-weight:700}
.rsec-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin:8px 0 4px}

.bottom{height:160px;background:var(--bg2);border-top:1px solid var(--border);display:flex;flex-shrink:0;overflow:hidden}
.ai-panel{width:220px;flex-shrink:0;border-right:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;overflow:hidden}
.ai-head{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--purple);text-transform:uppercase;margin-bottom:6px}
.ai-box{background:rgba(203,166,247,.07);border:1px solid rgba(203,166,247,.2);border-radius:6px;padding:7px;font-size:10px;line-height:1.6;color:var(--text);flex:1;overflow-y:auto}
.ai-box::-webkit-scrollbar{width:2px}.ai-box::-webkit-scrollbar-thumb{background:var(--border2)}
.ai-btns{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.ai-btn{padding:5px 6px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;font-size:9px;font-family:inherit;text-align:left;transition:all .15s}
.ai-btn:hover{color:var(--purple);border-color:rgba(203,166,247,.4)}
.cursor{display:inline-block;width:5px;height:10px;background:var(--purple);animation:blink .6s step-end infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.log-panel{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.log-head{height:30px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0}
.log-title{font-size:10px;font-weight:700}
.log-count{font-size:9px;color:var(--muted)}
.log-clr{margin-left:auto;padding:2px 7px;border-radius:4px;border:1px solid var(--border);background:none;color:var(--muted);font-size:9px;font-family:inherit;cursor:pointer}
.log-body{flex:1;overflow-y:auto;padding:6px 10px;font-size:10px;line-height:1.7}
.log-body::-webkit-scrollbar{width:3px}.log-body::-webkit-scrollbar-thumb{background:var(--border2)}
.le{display:flex;gap:8px}
.lts{color:var(--muted);min-width:40px;flex-shrink:0}
.lth{min-width:24px;font-weight:700;flex-shrink:0}
.lm{flex:1}
.lm.acq{color:var(--green)}.lm.rel{color:var(--blue)}.lm.blk{color:var(--red)}
.lm.sig{color:var(--teal)}.lm.wt{color:var(--amber)}.lm.dl{color:var(--red);font-weight:700;animation:blink .5s step-end infinite}
</style>

<div class="app">
<div class="topbar">
  <div class="logo">ThreadSync Lab</div>
  <div class="tabs" id="tabs">
    <button class="tab active" onclick="setTab('semaphore')">Semaphore</button>
    <button class="tab" onclick="setTab('mutex')">Mutex</button>
    <button class="tab" onclick="setTab('monitor')">Monitor</button>
    <button class="tab" onclick="setTab('rwlock')">RW Lock</button>
    <button class="tab" onclick="setTab('prodcons')">Producer-Consumer</button>
    <button class="tab" onclick="setTab('deadlock')">Deadlock</button>
  </div>
  <div class="status stop" id="badge">Stopped</div>
</div>

<div class="body">
  <div class="left">
    <div class="left-scroll">
      <div class="sec-lbl">Mechanisms</div>
      <button class="mbtn active" onclick="setTab('semaphore')"><span class="dot" style="background:#a6e3a1"></span>Semaphore</button>
      <button class="mbtn" onclick="setTab('mutex')"><span class="dot" style="background:#89b4fa"></span>Mutex</button>
      <button class="mbtn" onclick="setTab('monitor')"><span class="dot" style="background:#cba6f7"></span>Monitor</button>
      <button class="mbtn" onclick="setTab('rwlock')"><span class="dot" style="background:#f9e2af"></span>RW Lock</button>
      <button class="mbtn" onclick="setTab('prodcons')"><span class="dot" style="background:#f5c2e7"></span>Prod-Consumer</button>
      <button class="mbtn" onclick="setTab('deadlock')"><span class="dot" style="background:#f38ba8"></span>Deadlock</button>
      <div class="hdiv"></div>
      <div class="sec-lbl">Settings</div>
    </div>
    <div class="ctrl-area">
      <div class="ctrl-lbl">Controls</div>
      <div class="ctrl-row"><span class="ctrl-name">Threads</span><span class="ctrl-val" id="v-t">4</span></div>
      <input type="range" min="2" max="6" value="4" step="1" id="sl-t" oninput="document.getElementById('v-t').textContent=this.value;rebuildSim()">
      <div class="ctrl-row"><span class="ctrl-name">Speed</span><span class="ctrl-val" id="v-s">2x</span></div>
      <input type="range" min="1" max="4" value="2" step="1" id="sl-s" oninput="updateSpeed(this.value)">
      <div class="ctrl-row"><span class="ctrl-name">Resources</span><span class="ctrl-val" id="v-r">2</span></div>
      <input type="range" min="1" max="4" value="2" step="1" id="sl-r" oninput="document.getElementById('v-r').textContent=this.value;rebuildSim()">
      <div class="btn-row" style="margin-bottom:4px">
        <button class="btn pri" onclick="startSim()">▶ Start</button>
        <button class="btn" onclick="stopSim()">■ Stop</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="stepSim()">⏭ Step</button>
        <button class="btn" onclick="resetSim()">↺ Reset</button>
      </div>
    </div>
  </div>

  <div class="center">
    <div class="center-head">
      <span class="center-title" id="viz-title">Semaphore Visualization</span>
      <span class="center-sub" id="viz-sub"> — counting semaphore</span>
      <div class="view-btns">
        <button class="vbtn active" id="vbtn-g" onclick="setView('graph')">Graph</button>
        <button class="vbtn" id="vbtn-t" onclick="setView('timeline')">Timeline</button>

    <div class="canvas-wrap" id="cwrap">
      <canvas id="viz"></canvas>
    </div>
    <div class="metrics-bar" id="mbar"></div>
  </div>

  <div class="right">
    <div class="right-head">State Monitor</div>
    <div class="right-scroll" id="rscroll"></div>
  </div>
</div>

<div class="bottom">
  <div class="ai-panel">
    <div class="ai-head">✦ AI Insights</div>
    <div class="ai-box" id="ai-box"><span style="color:var(--muted)">Click a button below to get an AI explanation of the simulation state.</span></div>
    <div class="ai-btns">
      <button class="ai-btn" onclick="askAI('state')">✦ Explain current state</button>
      <button class="ai-btn" onclick="askAI('blocked')">✦ Why are threads blocked?</button>
    </div>
  </div>
  <div class="log-panel">
    <div class="log-head">
      <span class="log-title">Event Log</span>
      <span class="log-count" id="lcnt">0 events</span>
      <button class="log-clr" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-body" id="lbody"></div>
  </div>
</div>

<script>
const ST = {RUN:'running',BLK:'blocked',WAI:'waiting',SLP:'sleeping'};
const SC = {running:'#a6e3a1',blocked:'#f38ba8',waiting:'#f9e2af',sleeping:'#89b4fa'};
const THC = ['#a6e3a1','#89b4fa','#f9e2af','#f5c2e7','#94e2d5','#f38ba8'];

let tab='semaphore', running=false, tick=0, timer=null, speed=350, view='graph';
let sim={}, logArr=[], tlData={};

function mkSim(t){
  const n=+document.getElementById('sl-t').value;
  const res=+document.getElementById('sl-r').value;
  const threads=Array.from({length:n},(_,i)=>({id:i,name:'T'+(i+1),col:THC[i],state:ST.SLP,prog:0,runT:0,blkT:0}));
  const base={type:t,threads,tick:0,mx:{acq:0,con:0,cs:0,dl:0}};
  if(t==='semaphore') return{...base,permits:res,max:res,wq:[],holders:[]};
  if(t==='mutex') return{...base,locked:false,owner:null,wq:[]};
  if(t==='monitor') return{...base,locked:false,owner:null,mq:[],cq:[],cond:false,ct:0};
  if(t==='rwlock'){
    const wc=Math.ceil(n/3);
    return{...base,readers:[],writer:null,rwq:[],wwq:[],mode:'idle',writerCount:wc};
  }
  if(t==='prodcons'){
    const pc=Math.ceil(n/2);
    return{...base,buf:[],bufSz:res,pCount:pc};
  }
  if(t==='deadlock') return{...base,res:[{name:'R1',owner:null,wq:[]},{name:'R2',owner:null,wq:[]}],step:0,dead:false};
  return base;
}

function stepSem(){
  const s=sim;
  s.threads.forEach(t=>{
    t.blkT+=(t.state===ST.BLK||t.state===ST.WAI)?1:0;
    t.runT+=(t.state===ST.RUN)?1:0;
    if(t.state===ST.RUN){
      t.prog=Math.min(100,t.prog+Math.random()*11+4);
      if(t.prog>=100){
        t.prog=0;t.state=ST.SLP;
        const i=s.holders.indexOf(t.id);
        if(i>=0){s.holders.splice(i,1);s.permits++;}
        addLog(t.name,'rel',`released semaphore (${s.permits}/${s.max})`);
        s.mx.acq++;
        if(s.wq.length&&s.permits>0){
          const w=s.wq.shift();const wt=s.threads[w];
          wt.state=ST.RUN;s.holders.push(w);s.permits--;
          addLog(wt.name,'acq',`got semaphore (${s.permits}/${s.max})`);s.mx.cs++;
        }
      }
    } else if(t.state===ST.SLP&&Math.random()<.14){
      if(s.permits>0){s.permits--;s.holders.push(t.id);t.state=ST.RUN;addLog(t.name,'acq',`acquired (${s.permits}/${s.max})`);}
      else{t.state=ST.BLK;if(!s.wq.includes(t.id))s.wq.push(t.id);s.mx.con++;addLog(t.name,'blk',`blocked — queue:${s.wq.length}`);}
    }
  });
}

function stepMtx(){
  const s=sim;
  s.threads.forEach(t=>{
    t.blkT+=(t.state===ST.BLK)?1:0;
    t.runT+=(t.state===ST.RUN)?1:0;
    if(t.state===ST.RUN){
      t.prog=Math.min(100,t.prog+Math.random()*10+4);
      if(t.prog>=100){
        t.prog=0;t.state=ST.SLP;s.locked=false;s.owner=null;
        addLog(t.name,'rel','released mutex');
        if(s.wq.length){const w=s.wq.shift();const wt=s.threads[w];wt.state=ST.RUN;s.locked=true;s.owner=w;addLog(wt.name,'acq','acquired mutex');s.mx.cs++;}
      }
    } else if(t.state===ST.SLP&&Math.random()<.16){
      if(!s.locked){s.locked=true;s.owner=t.id;t.state=ST.RUN;addLog(t.name,'acq','acquired mutex');}
      else{t.state=ST.BLK;if(!s.wq.includes(t.id))s.wq.push(t.id);s.mx.con++;addLog(t.name,'blk',`blocked (held by T${s.owner+1})`);}
    }
  });
}

function stepMon(){
  const s=sim;s.ct++;
  if(s.ct%28===0)s.cond=!s.cond;
  s.threads.forEach(t=>{
    t.blkT+=(t.state===ST.BLK||t.state===ST.WAI)?1:0;
    t.runT+=(t.state===ST.RUN)?1:0;
    if(t.state===ST.RUN){
      t.prog=Math.min(100,t.prog+Math.random()*8+3);
      if(t.prog>=100){
        if(!s.cond&&Math.random()<.35){
          t.state=ST.WAI;t.prog=0;s.locked=false;s.owner=null;s.cq.push(t.id);
          addLog(t.name,'wt','waiting on condition');
          if(s.mq.length){const n=s.mq.shift();const nt=s.threads[n];nt.state=ST.RUN;s.locked=true;s.owner=n;addLog(nt.name,'acq','entered monitor');}
        } else {
          t.prog=0;t.state=ST.SLP;
          if(s.cq.length){const sid=s.cq.shift();const st=s.threads[sid];st.state=ST.RUN;s.locked=true;s.owner=sid;addLog(t.name,'sig',`signaled → woke ${st.name}`);s.mx.cs++;}
          else{s.locked=false;s.owner=null;addLog(t.name,'rel','exited monitor');if(s.mq.length){const n=s.mq.shift();s.threads[n].state=ST.RUN;s.locked=true;s.owner=n;}}
        }
      }
    } else if(t.state===ST.SLP&&Math.random()<.13){
      if(!s.locked){s.locked=true;s.owner=t.id;t.state=ST.RUN;addLog(t.name,'acq','entered monitor');}
      else{t.state=ST.BLK;if(!s.mq.includes(t.id))s.mq.push(t.id);addLog(t.name,'blk','blocked at monitor entry');}
    }
  });
}

function stepRW(){
  const s=sim;
  s.threads.forEach((t,i)=>{
    const isW=i<s.writerCount;
    t.blkT+=(t.state===ST.BLK)?1:0;
    t.runT+=(t.state===ST.RUN)?1:0;
    if(t.state===ST.RUN){
      t.prog=Math.min(100,t.prog+Math.random()*8+3);
      if(t.prog>=100){
        t.prog=0;t.state=ST.SLP;
        if(isW){s.writer=null;if(!s.readers.length)s.mode='idle';addLog(t.name,'rel','released write lock');}
        else{s.readers=s.readers.filter(id=>id!==t.id);if(!s.readers.length&&!s.writer)s.mode='idle';addLog(t.name,'rel',`released read lock`);}
        if(s.mode==='idle'){
          const ww=s.wwq.shift();
          if(ww!==undefined){s.threads[ww].state=ST.RUN;s.writer=ww;s.mode='write';addLog(s.threads[ww].name,'acq','acquired write lock');}
          else while(s.rwq.length){const rr=s.rwq.shift();s.threads[rr].state=ST.RUN;s.readers.push(rr);s.mode='read';addLog(s.threads[rr].name,'acq',`acquired read lock (${s.readers.length}R)`);}
        }
      }
    } else if(t.state===ST.SLP&&Math.random()<.13){
      if(isW){
        if(s.mode==='idle'){s.writer=t.id;s.mode='write';t.state=ST.RUN;addLog(t.name,'acq','acquired write lock');}
        else{t.state=ST.BLK;if(!s.wwq.includes(t.id))s.wwq.push(t.id);s.mx.con++;addLog(t.name,'blk',`blocked-write (${s.mode})`);}
      } else {
        if(s.mode!=='write'&&!s.wwq.length){s.readers.push(t.id);s.mode='read';t.state=ST.RUN;addLog(t.name,'acq',`read lock (${s.readers.length}R)`);}
        else{t.state=ST.BLK;if(!s.rwq.includes(t.id))s.rwq.push(t.id);s.mx.con++;addLog(t.name,'blk','blocked for read');}
      }
    }
  });
}

function stepPC(){
  const s=sim;
  s.threads.forEach((t,i)=>{
    const iP=i<s.pCount;
    t.blkT+=(t.state===ST.BLK)?1:0;
    t.runT+=(t.state===ST.RUN)?1:0;
    if(t.state===ST.RUN){
      t.prog=Math.min(100,t.prog+Math.random()*10+4);
      if(t.prog>=100){
        t.prog=0;t.state=ST.SLP;
        if(iP&&s.buf.length<s.bufSz){s.buf.push(t.id);addLog(t.name,'sig',`produced (buf:${s.buf.length}/${s.bufSz})`);}
        else if(!iP&&s.buf.length>0){s.buf.pop();addLog(t.name,'acq',`consumed (buf:${s.buf.length}/${s.bufSz})`);}
      }
    } else if(t.state===ST.BLK){
      if(iP&&s.buf.length<s.bufSz){t.state=ST.RUN;addLog(t.name,'sig','buffer free — resumed');}
      else if(!iP&&s.buf.length>0){t.state=ST.RUN;addLog(t.name,'sig','item ready — resumed');}
    } else if(t.state===ST.SLP&&Math.random()<.15){
      if(iP){
        if(s.buf.length<s.bufSz)t.state=ST.RUN;
        else{t.state=ST.BLK;s.mx.con++;addLog(t.name,'blk',`blocked-full (${s.buf.length}/${s.bufSz})`);}
      } else {
        if(s.buf.length>0)t.state=ST.RUN;
        else{t.state=ST.BLK;s.mx.con++;addLog(t.name,'blk','blocked-empty');}
      }
    }
  });
}

function stepDL(){
  const s=sim;
  if(s.dead)return;
  s.step++;
  const [t0,t1]=s.threads;const[r0,r1]=s.res;
  if(s.step===6){r0.owner=0;t0.state=ST.RUN;addLog('T1','acq','acquired R1');s.mx.acq++;}
  else if(s.step===12){r1.owner=1;t1.state=ST.RUN;addLog('T2','acq','acquired R2');s.mx.acq++;}
  else if(s.step===20){t0.state=ST.BLK;t0.waitFor=1;r1.wq.push(0);s.mx.con++;addLog('T1','blk','blocked — needs R2 (held by T2)');}
  else if(s.step===26){t1.state=ST.BLK;t1.waitFor=0;r0.wq.push(1);s.mx.con++;addLog('T2','blk','blocked — needs R1 (held by T1)');s.dead=true;s.mx.dl++;addLog('SYS','dl','DEADLOCK: T1→R2→T2→R1→T1');}
}

function doTick(){
  tick++;
  sim.threads.forEach(t=>{
    if(!tlData[t.name])tlData[t.name]=[];
    tlData[t.name].push(t.state);
    if(tlData[t.name].length>70)tlData[t.name].shift();
  });
  if(tab==='semaphore')stepSem();
  else if(tab==='mutex')stepMtx();
  else if(tab==='monitor')stepMon();
  else if(tab==='rwlock')stepRW();
  else if(tab==='prodcons')stepPC();
  else if(tab==='deadlock')stepDL();
  render();renderRight();renderMetrics();
}

function render(){
  const wrap=document.getElementById('cwrap');
  const cv=document.getElementById('viz');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  if(view==='timeline'){drawTimeline(ctx,W,H);return;}
  if(tab==='semaphore')drawSem(ctx,W,H);
  else if(tab==='mutex')drawMtx(ctx,W,H);
  else if(tab==='monitor')drawMon(ctx,W,H);
  else if(tab==='rwlock')drawRW(ctx,W,H);
  else if(tab==='prodcons')drawPC(ctx,W,H);
  else if(tab==='deadlock')drawDL(ctx,W,H);
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawThread(ctx,t,x,y,r){
  const c=SC[t.state]||'#555';
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#1c2230';ctx.fill();
  ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke();
  if(t.state===ST.RUN&&t.prog>0){
    ctx.beginPath();ctx.arc(x,y,r,-Math.PI/2,-Math.PI/2+(t.prog/100)*Math.PI*2);
    ctx.strokeStyle=c+'99';ctx.lineWidth=3.5;ctx.stroke();
  }
  ctx.fillStyle='#cdd6f4';ctx.font='bold 10px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(t.name,x,y);
}

function arrow(ctx,x1,y1,x2,y2,c,dash){
  ctx.save();ctx.strokeStyle=c;ctx.lineWidth=1.2;
  if(dash)ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  const a=Math.atan2(y2-y1,x2-x1);
  ctx.fillStyle=c;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-7*Math.cos(a-.4),y2-7*Math.sin(a-.4));
  ctx.lineTo(x2-7*Math.cos(a+.4),y2-7*Math.sin(a+.4));
  ctx.closePath();ctx.fill();ctx.restore();
}

function resBox(ctx,x,y,w,h,label,info,c){
  ctx.fillStyle='#1a1d2e';ctx.strokeStyle=c;ctx.lineWidth=1.5;
  rrect(ctx,x-w/2,y-h/2,w,h,9);ctx.fill();ctx.stroke();
  ctx.fillStyle=c;ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,x,y-7);
  ctx.fillStyle='#6c7faa';ctx.font='9px monospace';
  ctx.fillText(info,x,y+7);
}

function label(ctx,txt,x,y,c){
  ctx.fillStyle=c||'#6c7faa';ctx.font='9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,x,y);
}

function drawSem(ctx,W,H){
  const s=sim;const cx=W/2,cy=H/2;
  resBox(ctx,cx,cy,160,62,'Semaphore',`${s.permits}/${s.max} permits`,'#a6e3a1');
  for(let i=0;i<s.max;i++){
    const px=cx-(s.max-1)*14+i*28,py=cy+2;
    ctx.beginPath();ctx.arc(px,py,8,0,Math.PI*2);
    ctx.fillStyle=i<(s.max-s.permits)?'#a6e3a1':'#2d3550';ctx.fill();
    ctx.strokeStyle='#a6e3a155';ctx.lineWidth=1;ctx.stroke();
  }
  const n=s.threads.length;const R=Math.min(W,H)*0.33;
  s.threads.forEach((t,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const tx=cx+R*Math.cos(a),ty=cy+R*Math.sin(a);
    const dx=tx-cx,dy=ty-cy,dist=Math.sqrt(dx*dx+dy*dy);
    const sx=cx+(dx/dist)*82,sy=cy+(dy/dist)*32;
    const ex=tx-(dx/dist)*22,ey=ty-(dy/dist)*22;
    if(t.state===ST.RUN)arrow(ctx,ex,ey,sx,sy,'#a6e3a1',false);
    else if(t.state===ST.BLK)arrow(ctx,ex,ey,sx,sy,'#f38ba8',true);
    drawThread(ctx,t,tx,ty,20);
  });
  if(s.wq.length)label(ctx,'Wait: ['+s.wq.map(i=>'T'+(i+1)).join(',')+']',cx,cy+65,'#f38ba8');
}

function drawMtx(ctx,W,H){
  const s=sim;const cx=W/2,cy=H/2;
  const lc=s.locked?'#f38ba8':'#a6e3a1';
  resBox(ctx,cx,cy,150,60,'Mutex',s.locked?`LOCKED - T${s.owner+1}`:'UNLOCKED',lc);
  const n=s.threads.length;const R=Math.min(W,H)*0.32;
  s.threads.forEach((t,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const tx=cx+R*Math.cos(a),ty=cy+R*Math.sin(a);
    const dx=tx-cx,dy=ty-cy,dist=Math.sqrt(dx*dx+dy*dy);
    const sx=cx+(dx/dist)*78,sy=cy+(dy/dist)*31;
    const ex=tx-(dx/dist)*22,ey=ty-(dy/dist)*22;
    if(t.state===ST.RUN&&s.owner===t.id)arrow(ctx,sx,sy,ex,ey,'#a6e3a1',false);
    else if(t.state===ST.BLK)arrow(ctx,ex,ey,sx,sy,'#f38ba8',true);
    drawThread(ctx,t,tx,ty,20);
  });
  if(s.wq.length)label(ctx,'Queue: ['+s.wq.map(i=>'T'+(i+1)).join(',')+']',cx,cy+60,'#f38ba8');
}

function drawMon(ctx,W,H){
  const s=sim;const cx=W/2,cy=H/2-15;
  ctx.fillStyle='#1a1d2e';ctx.strokeStyle='#cba6f7';ctx.lineWidth=1.5;
  rrect(ctx,cx-115,cy-60,230,115,12);ctx.fill();ctx.stroke();
  ctx.fillStyle='#cba6f7';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Monitor',cx,cy-43);
  ctx.fillStyle='#6c7faa';ctx.font='9px monospace';
  ctx.fillText(s.locked?`owner: T${s.owner+1}`:'free',cx,cy-27);
  ctx.fillStyle='#21273a';ctx.strokeStyle='#89b4fa';ctx.lineWidth=1;
  rrect(ctx,cx-55,cy-15,110,30,5);ctx.fill();ctx.stroke();
  ctx.fillStyle='#89b4fa';ctx.font='9px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('cond = '+(s.cond?'true':'false'),cx,cy);
  if(s.cq.length)label(ctx,'cond_wait:['+s.cq.map(i=>'T'+(i+1)).join(',')+']',cx,cy+25,'#f9e2af');
  const n=s.threads.length;const R=Math.min(W,H)*0.32;
  s.threads.forEach((t,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2;
    const tx=cx+R*Math.cos(a),ty=cy+R*Math.sin(a);
    const dx=tx-cx,dy=ty-cy,dist=Math.sqrt(dx*dx+dy*dy);
    const sx=cx+(dx/dist)*116,sy=cy+(dy/dist)*60;
    const ex=tx-(dx/dist)*22,ey=ty-(dy/dist)*22;
    const c=t.state===ST.WAI?'#f9e2af':t.state===ST.RUN?'#cba6f7':'#f38ba8';
    if(t.state!==ST.SLP)arrow(ctx,ex,ey,sx,sy,c,t.state!==ST.RUN);
    drawThread(ctx,t,tx,ty,20);
  });
}

function drawRW(ctx,W,H){
  const s=sim;const cx=W/2,cy=H/2;
  const mc=s.mode==='write'?'#f38ba8':s.mode==='read'?'#a6e3a1':'#6c7faa';
  resBox(ctx,cx,cy,165,62,'RW Lock',`${s.mode.toUpperCase()} | ${s.readers.length}R / ${s.writer!==null?'1W':'0W'}`,mc);
  const n=s.threads.length;const wc=s.writerCount;
  s.threads.forEach((t,i)=>{
    const isW=i<wc;
    const side=isW?-1:1;
    const grp=isW?wc:n-wc;
    const idx=isW?i:i-wc;
    const tx=cx+side*(W*0.34);
    const ty=cy+(idx-(grp-1)/2)*62;
    const dx=tx-cx,dy=ty-cy,dist=Math.sqrt(dx*dx+dy*dy);
    const sx=cx+(dx/dist)*84,sy=cy+(dy/dist)*32;
    const ex=tx-(dx/dist)*22,ey=ty-(dy/dist)*22;
    const c=isW?'#f38ba8':'#a6e3a1';
    if(t.state===ST.RUN)arrow(ctx,sx,sy,ex,ey,c,false);
    else if(t.state===ST.BLK)arrow(ctx,ex,ey,sx,sy,'#f38ba8',true);
    drawThread(ctx,t,tx,ty,20);
    label(ctx,isW?'WRITER':'READER',tx,ty+28,isW?'#f38ba855':'#a6e3a155');
  });
}

function drawPC(ctx,W,H){
  const s=sim;const cx=W/2,cy=H/2;
  const bw=s.bufSz*30+24,bh=44;
  ctx.fillStyle='#1a1d2e';ctx.strokeStyle='#f5c2e7';ctx.lineWidth=1.5;
  rrect(ctx,cx-bw/2,cy-bh/2,bw,bh,7);ctx.fill();ctx.stroke();
  label(ctx,`Buffer ${s.buf.length}/${s.bufSz}`,cx,cy-bh/2-11,'#f5c2e7');
  for(let i=0;i<s.bufSz;i++){
    const bx=cx-bw/2+8+i*30,by=cy-16;
    ctx.fillStyle=i<s.buf.length?'#f5c2e7aa':'#21273a';
    ctx.strokeStyle='#3d4870';ctx.lineWidth=1;
    rrect(ctx,bx,by,22,26,3);ctx.fill();ctx.stroke();
    if(i<s.buf.length){ctx.fillStyle='#cdd6f4';ctx.font='10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('■',bx+11,by+13);}
  }
  const pc=s.pCount,cc=s.threads.length-pc;
  s.threads.forEach((t,i)=>{
    const isP=i<pc;
    const grp=isP?pc:cc;
    const idx=isP?i:i-pc;
    const tx=cx+(isP?-1:1)*W*0.33;
    const ty=cy+(idx-(grp-1)/2)*62;
    if(t.state!==ST.SLP){
      const ex=isP?tx+22:cx+bw/2;const ey=isP?ty:cy;
      const sx=isP?cx-bw/2:tx-22;const sy=isP?cy:ty;
      arrow(ctx,sx,sy,ex,ey,isP?'#a6e3a1':'#89b4fa',t.state===ST.BLK);
    }
    drawThread(ctx,t,tx,ty,20);
    label(ctx,isP?'PROD':'CONS',tx,ty+28,isP?'#a6e3a155':'#89b4fa55');
  });
}

function drawDL(ctx,W,H){
  const s=sim;const cx=W/2,cy=H/2;
  const[r0,r1]=s.res;const[t0,t1]=s.threads;
  resBox(ctx,cx-140,cy,100,54,r0.name,r0.owner!==null?`T${r0.owner+1} holds`:'free',r0.owner!==null?'#f38ba8':'#a6e3a1');
  resBox(ctx,cx+140,cy,100,54,r1.name,r1.owner!==null?`T${r1.owner+1} holds`:'free',r1.owner!==null?'#f38ba8':'#a6e3a1');
  drawThread(ctx,t0,cx-140,cy-120,24);
  drawThread(ctx,t1,cx+140,cy-120,24);
  if(r0.owner===0)arrow(ctx,cx-140,cy-28,cx-140,cy-96,'#a6e3a1',false);
  if(r1.owner===1)arrow(ctx,cx+140,cy-28,cx+140,cy-96,'#a6e3a1',false);
  if(t0.waitFor===1)arrow(ctx,cx-116,cy-120,cx+90,cy-50,'#f38ba8',true);
  if(t1.waitFor===0)arrow(ctx,cx+116,cy-120,cx-90,cy-50,'#f38ba8',true);
  if(s.dead){
    ctx.fillStyle='#f38ba8';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('DEADLOCK DETECTED',cx,cy+65);
    label(ctx,'Circular wait: T1→R2→T2→R1→T1',cx,cy+82,'#6c7faa');
  } else {
    label(ctx,`Step ${s.step} — watching for deadlock...`,cx,cy+65,'#6c7faa');
  }
}

function drawTimeline(ctx,W,H){
  const threads=sim.threads;
  const rh=28,top=24,left=56,tw=W-left-12;
  ctx.fillStyle='#6c7faa';ctx.font='9px monospace';ctx.textAlign='right';ctx.textBaseline='middle';
  threads.forEach((t,i)=>{
    const y=top+i*rh+rh/2;
    ctx.fillText(t.name,left-6,y);
    const data=tlData[t.name]||[];
    const sw=tw/Math.max(data.length,1);
    data.forEach((st,j)=>{
      ctx.fillStyle=SC[st]+'88';
      ctx.fillRect(left+j*sw,top+i*rh+3,sw+.5,rh-6);
    });
    ctx.strokeStyle='#2d3550';ctx.lineWidth=.5;
    ctx.strokeRect(left,top+i*rh+3,tw,rh-6);
  });
  const states=[ST.RUN,ST.BLK,ST.WAI,ST.SLP];
  const lbls=['Running','Blocked','Waiting','Sleeping'];
  states.forEach((s,i)=>{
    const lx=left+i*90;
    ctx.fillStyle=SC[s];ctx.fillRect(lx,H-16,10,10);
    ctx.fillStyle='#6c7faa';ctx.font='9px monospace';ctx.textAlign='left';
    ctx.fillText(lbls[i],lx+14,H-11);
  });
}

function renderRight(){
  const s=sim;let h='';
  h+='<div class="rsec-lbl" style="margin-top:0">Threads</div>';
  s.threads.forEach(t=>{
    const sc={running:'s-run',blocked:'s-blk',waiting:'s-wai',sleeping:'s-slp'}[t.state]||'s-slp';
    const bc=SC[t.state]||'#555';
    const bw=t.state===ST.RUN?t.prog:0;
    h+=`<div class="tcard ${t.state}">
      <div class="tcard-top"><span class="tname">${t.name}</span><span class="tstate ${sc}">${t.state}</span></div>
      <div class="tbar-bg"><div class="tbar-fg" style="width:${Math.round(bw)}%;background:${bc}"></div></div>
      <div class="tmeta"><span>run:${t.runT}</span><span>blk:${t.blkT}</span></div>
    </div>`;
  });
  if(tab==='semaphore'){
    h+='<div class="rsec-lbl">Semaphore</div>';
    h+=`<div class="rcard"><div class="rcard-top"><span class="rname">Permits</span><span style="color:#a6e3a1;font-size:11px">${s.permits}/${s.max}</span></div>`;
    h+='<div style="display:flex;gap:4px;margin-top:4px">';
    for(let i=0;i<s.max;i++)h+=`<div style="width:16px;height:16px;border-radius:50%;background:${i<(s.max-s.permits)?'#a6e3a1':'#2d3550'};border:1px solid #3d4870"></div>`;
    h+='</div></div>';
  } else if(tab==='mutex'){
    h+='<div class="rsec-lbl">Mutex</div>';
    h+=`<div class="rcard"><div class="rcard-top"><span class="rname">Lock</span><span style="color:${s.locked?'#f38ba8':'#a6e3a1'};font-size:10px">${s.locked?'LOCKED':'FREE'}</span></div><div style="font-size:9px;color:var(--muted)">${s.locked?'by T'+(s.owner+1):'—'}</div></div>`;
  } else if(tab==='rwlock'){
    h+='<div class="rsec-lbl">RW Lock</div>';
    h+=`<div class="rcard"><div class="rcard-top"><span class="rname">Mode</span><span style="color:${s.mode==='write'?'#f38ba8':s.mode==='read'?'#a6e3a1':'#6c7faa'};font-size:10px">${s.mode.toUpperCase()}</span></div><div style="font-size:9px;color:var(--muted)">${s.readers.length}R / ${s.writer!==null?'1':'0'}W</div></div>`;
  } else if(tab==='prodcons'){
    h+='<div class="rsec-lbl">Buffer</div>';
    h+=`<div class="rcard"><div class="rcard-top"><span class="rname">Buffer</span><span style="color:#f5c2e7;font-size:11px">${s.buf.length}/${s.bufSz}</span></div>`;
    h+='<div style="display:flex;gap:3px;margin-top:5px;flex-wrap:wrap">';
    for(let i=0;i<s.bufSz;i++)h+=`<div style="width:18px;height:18px;border-radius:3px;background:${i<s.buf.length?'#f5c2e7aa':'#2d3550'};border:1px solid #3d4870;display:flex;align-items:center;justify-content:center;font-size:9px">${i<s.buf.length?'■':''}</div>`;
    h+='</div></div>';
  } else if(tab==='deadlock'){
    h+='<div class="rsec-lbl">Resources</div>';
    s.res.forEach(r=>{
      h+=`<div class="rcard"><div class="rcard-top"><span class="rname">${r.name}</span><span style="color:${r.owner!==null?'#f38ba8':'#a6e3a1'};font-size:10px">${r.owner!==null?'T'+(r.owner+1):'free'}</span></div></div>`;
    });
    if(s.dead)h+=`<div style="background:rgba(243,139,168,.1);border:1px solid rgba(243,139,168,.3);border-radius:6px;padding:7px;font-size:9px;color:#f38ba8;line-height:1.6">Deadlock detected!<br>Circular dependency between T1 and T2.</div>`;
  } else if(tab==='monitor'){
    h+='<div class="rsec-lbl">Monitor</div>';
    h+=`<div class="rcard"><div class="rcard-top"><span class="rname">State</span><span style="color:${s.locked?'#cba6f7':'#a6e3a1'};font-size:10px">${s.locked?'LOCKED':'FREE'}</span></div><div style="font-size:9px;color:var(--muted)">cond: ${s.cond}<br>cond_queue: ${s.cq.length}</div></div>`;
  }
  document.getElementById('rscroll').innerHTML=h;
}

function renderMetrics(){
  const m=sim.mx;
  document.getElementById('mbar').innerHTML=`
    <div class="metric"><div class="mval" style="color:#89b4fa">${m.acq}</div><div class="mlbl">Acquisitions</div></div>
    <div class="metric" style="margin-left:12px"><div class="mval" style="color:#f9e2af">${m.con}</div><div class="mlbl">Contentions</div></div>
    <div class="metric" style="margin-left:12px"><div class="mval" style="color:#a6e3a1">${m.cs}</div><div class="mlbl">Ctx Switches</div></div>
    <div class="metric" style="margin-left:12px"><div class="mval" style="color:#f38ba8">${m.dl}</div><div class="mlbl">Deadlocks</div></div>
    <div class="metric" style="margin-left:12px"><div class="mval" style="color:#cba6f7">${tick}</div><div class="mlbl">Tick</div></div>
    <div class="metric" style="margin-left:12px"><div class="mval" style="color:#94e2d5">${sim.threads.filter(t=>t.state===ST.RUN).length}</div><div class="mlbl">Running</div></div>
    <div class="metric" style="margin-left:12px"><div class="mval" style="color:#f38ba8">${sim.threads.filter(t=>t.state===ST.BLK||t.state===ST.WAI).length}</div><div class="mlbl">Blocked</div></div>
  `;
}

function addLog(thread,type,msg){
  const lb=document.getElementById('lbody');
  const e=document.createElement('div');e.className='le';
  const tc={T1:'#a6e3a1',T2:'#89b4fa',T3:'#f9e2af',T4:'#f5c2e7',T5:'#94e2d5',T6:'#f38ba8',SYS:'#f38ba8'}[thread]||'#cdd6f4';
  e.innerHTML=`<span class="lts">${String(tick).padStart(4,'0')}</span><span class="lth" style="color:${tc}">${thread}</span><span class="lm ${type}">${msg}</span>`;
  lb.insertBefore(e,lb.firstChild);
  while(lb.children.length>100)lb.removeChild(lb.lastChild);
  logArr.unshift({tick,thread,type,msg});if(logArr.length>200)logArr.pop();
  document.getElementById('lcnt').textContent=logArr.length+' events';
}

function clearLog(){document.getElementById('lbody').innerHTML='';logArr=[];document.getElementById('lcnt').textContent='0 events';}

function startSim(){
  if(running)return;running=true;
  document.getElementById('badge').textContent='Running';
  document.getElementById('badge').className='status run';
  timer=setInterval(doTick,speed);
}
function stopSim(){
  running=false;clearInterval(timer);
  document.getElementById('badge').textContent='Stopped';
  document.getElementById('badge').className='status stop';
}
function stepSim(){stopSim();doTick();}
function resetSim(){
  stopSim();tick=0;logArr=[];tlData={};clearLog();
  sim=mkSim(tab);render();renderRight();renderMetrics();
}
function rebuildSim(){resetSim();}
function updateSpeed(v){
  const sp=[0,500,300,180,90];document.getElementById('v-s').textContent=v+'x';
  speed=sp[v]||300;if(running){clearInterval(timer);timer=setInterval(doTick,speed);}
}
function setTab(name){
  tab=name;
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const ts=['semaphore','mutex','monitor','rwlock','prodcons','deadlock'];
    b.classList.toggle('active',ts[i]===name);
  });
  document.querySelectorAll('.mbtn').forEach((b,i)=>{
    const ts=['semaphore','mutex','monitor','rwlock','prodcons','deadlock'];
    b.classList.toggle('active',ts[i]===name);
  });
  const titles={semaphore:'Semaphore',mutex:'Mutex',monitor:'Monitor',rwlock:'RW Lock',prodcons:'Producer-Consumer',deadlock:'Deadlock Demo'};
  const subs={semaphore:' — counting semaphore with permits',mutex:' — mutual exclusion lock',monitor:' — monitor + condition variables',rwlock:' — concurrent reads, exclusive writes',prodcons:' — bounded buffer problem',deadlock:' — circular wait detection'};
  document.getElementById('viz-title').textContent=titles[name];
  document.getElementById('viz-sub').textContent=subs[name]||'';
  resetSim();
}
function setView(v){
  view=v;
  document.getElementById('vbtn-g').classList.toggle('active',v==='graph');
  document.getElementById('vbtn-t').classList.toggle('active',v==='timeline');
  render();
}

async function askAI(type){
  const box=document.getElementById('ai-box');
  box.innerHTML='<span class="cursor"></span>';
  const s=sim;
  const ts=s.threads.map(t=>`${t.name}(${t.state})`).join(', ');
  const blk=s.threads.filter(t=>t.state===ST.BLK||t.state===ST.WAI).length;
  const run=s.threads.filter(t=>t.state===ST.RUN).length;
  let state=`Mechanism: ${tab}, tick: ${tick}, threads: [${ts}], running: ${run}, blocked: ${blk}, contentions: ${s.mx.con}`;
  if(tab==='semaphore')state+=`, permits: ${s.permits}/${s.max}`;
  else if(tab==='mutex')state+=`, locked: ${s.locked}${s.locked?', owner: T'+(s.owner+1):''}`;
  else if(tab==='prodcons')state+=`, buffer: ${s.buf.length}/${s.bufSz}`;
  else if(tab==='deadlock')state+=`, deadlocked: ${s.dead}`;
  const prompts={
    state:`OS concurrency expert. Given this simulation state, explain in 3 sentences: what is happening, why some threads may be blocked, and one key learning:\n\n${state}\n\nBe concise and educational.`,
    blocked:`Why are ${blk} thread(s) blocked in this ${tab} simulation? State: ${state}\n\nExplain the root cause in 2 sentences with the specific synchronization concept.`
  };
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:180,messages:[{role:'user',content:prompts[type]}]})});
    const data=await res.json();
    box.textContent=data.content?.[0]?.text||'No response.';
  }catch(e){box.textContent='AI unavailable. Start the simulation and try again.';}
}

sim=mkSim('semaphore');
render();renderRight();renderMetrics();
window.addEventListener('resize',()=>{render();});
</script>
